<div class="services-component">
  <div
    class="services-card-component"
    [class.services-single]="isSingleService()"
  >
    <ng-container *ngIf="!isSingleService(); else singleService">
      <div class="services-column">
        <ng-container *ngFor="let service of services().slice(0, 2)">
          <ng-container *ngTemplateOutlet="card; context: { $implicit: service }"></ng-container>
        </ng-container>
      </div>

      <div class="services-column" *ngIf="services().length > 2">
        <ng-container *ngFor="let service of services().slice(2, 4)">
          <ng-container *ngTemplateOutlet="card; context: { $implicit: service }"></ng-container>
        </ng-container>
      </div>
    </ng-container>

    <ng-template #singleService>
      <div class="services-column services-column--single">
        <ng-container *ngTemplateOutlet="card; context: { $implicit: services()[0], single: true }"></ng-container>
      </div>
    </ng-template>
  </div>
</div>

<ng-template #card let-service let-single="single">
  <div class="services-card-img" [class.services-card-img--single]="single">
    <div class="services-card-front-content">
      <div class="services-card-picture">
        <img [src]="service.logo" [alt]="service.title + ' icon'" />
      </div>
      <div class="services-card-title">{{ service.title }}</div>
    </div>

    <div class="services-card-back-content">
      <div class="services-card-details">
        <div class="services-list-choices">
          <div class="services-list-choices-title">{{ service.menuTitle }}</div>
          <div
            class="services-list-choices-detail"
            *ngFor="let row of service.rows"
          >
            {{ row.label }}
          </div>
        </div>
        <div class="services-list-prices">
          <div class="services-list-choices-title">Price</div>
          <div
            class="services-list-choices-detail"
            *ngFor="let row of service.rows"
          >
            {{ row.price }}
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-template>
