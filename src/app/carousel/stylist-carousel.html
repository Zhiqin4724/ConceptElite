<section class="carousel-section">

  <div class="section-header">
    <div class="header-left">
      <h2 class="section-title">{{ 'stylists.title' | translate }}</h2>
      <p class="section-subtitle">{{ 'stylists.subtitle' | translate }}</p>
    </div>

    <div class="filter-wrapper">
      <button class="filter-btn" (click)="toggleDropdown()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
        {{ selectedLocation ?? ('stylists.allCities' | translate) }}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>

      <div class="dropdown" *ngIf="dropdownOpen">
        <button class="dropdown-item" [class.active]="selectedLocation === null" (click)="selectLocation(null)">
          {{ 'stylists.allCities' | translate }}
        </button>
        <button
          *ngFor="let loc of locations"
          class="dropdown-item"
          [class.active]="selectedLocation === loc"
          (click)="selectLocation(loc)"
        >
          {{ loc }}
        </button>
      </div>
    </div>
  </div>

  <div class="carousel-wrapper">

    <button class="carousel-btn" (click)="prev()" [disabled]="!canGoPrev" [attr.aria-label]="'stylists.prev' | translate">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>

    <div class="carousel-viewport">

      <!-- Current slide -->
      <div class="carousel-track" [ngClass]="animationClass ? 'exit-' + (animationClass === 'enter-left' ? 'left' : 'right') : ''">
        <app-stylist-card
          *ngFor="let stylist of currentSlide; trackBy: trackBySlug"
          [stylist]="stylist"
          
        />
      </div>

      <!-- Incoming slide -->
      <div class="carousel-track overlay" [ngClass]="animationClass" *ngIf="nextSlide.length">
        <app-stylist-card
          *ngFor="let stylist of nextSlide; trackBy: trackBySlug"
          [stylist]="stylist"
          
        />
      </div>

    </div>

    <button class="carousel-btn" (click)="next()" [disabled]="!canGoNext" [attr.aria-label]="'stylists.next' | translate">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>

  </div>

</section>
