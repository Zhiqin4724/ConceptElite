<section class="instagram-videos-section">
  <div class="section-header">
    <div class="header-left">
      <h2 class="section-title">{{ 'videos.title' | translate }}</h2>
      <p class="section-subtitle">{{ 'videos.subtitle' | translate }}</p>
    </div>
  </div>

  <div class="videos-container">
    <!-- Main image display -->
    <div class="main-video-player" *ngIf="selectedVideo">
      <img [src]="selectedVideo.thumbnail" [alt]="selectedVideo.alt" />
    </div>

    <!-- Carousel for thumbnails -->
    <div class="carousel-wrapper">
      <button class="carousel-btn" (click)="prev()" [disabled]="!canGoPrev" [attr.aria-label]="'stylists.prev' | translate">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>

      <div class="carousel-viewport">
        <!-- Current slide -->
        <div class="carousel-track" [ngClass]="animationClass ? 'exit-' + (animationClass === 'enter-left' ? 'left' : 'right') : ''">
          <div
            *ngFor="let video of currentSlide; trackBy: trackByVideoId"
            class="video-thumbnail"
            [class.active]="selectedVideo?.id === video.id"
            (click)="selectVideo(video)"
          >
            <img [src]="video.thumbnail" [alt]="video.alt" class="thumbnail-image" />
          </div>
        </div>

        <!-- Incoming slide -->
        <div class="carousel-track overlay" [ngClass]="animationClass" *ngIf="nextSlide.length">
          <div
            *ngFor="let video of nextSlide; trackBy: trackByVideoId"
            class="video-thumbnail"
            [class.active]="selectedVideo?.id === video.id"
            (click)="selectVideo(video)"
          >
            <img [src]="video.thumbnail" [alt]="video.alt" class="thumbnail-image" />
          </div>
        </div>
      </div>

      <button class="carousel-btn" (click)="next()" [disabled]="!canGoNext" [attr.aria-label]="'stylists.next' | translate">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>
  </div>
</section>
