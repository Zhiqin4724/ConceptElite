<a class="stylist-card" [routerLink]="['/stylists', stylist.slug]" [attr.aria-label]="('stylists.viewProfile' | translate) + ' ' + stylist.name">

  <div class="card-image-wrapper">
    <img
      [src]="stylist.imageUrl"
      [alt]="stylist.name"
      class="card-image"
      loading="lazy"
    />
    <div class="card-overlay">
      <span class="specialty-badge">{{ stylist.specialty }}</span>
    </div>
  </div>

  <div class="card-info">
    <h3 class="card-name">{{ stylist.name }}</h3>
    <div class="card-location">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
        <circle cx="12" cy="10" r="3"></circle>
      </svg>
      <span>{{ stylist.location }}</span>
    </div>
  </div>

</a>
